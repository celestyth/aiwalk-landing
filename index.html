<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aiwalk</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #111111;
      --muted: #666666;
      --accent: #111111;
      --accent-fg: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0c10;
        --fg: #f2f2f2;
        --muted: #b5b5b5;
        --accent: #f2f2f2;
        --accent-fg: #0b0c10;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
    }
    header .logo {
      font-weight: 700;
      font-size: 1.25rem;
    }
    main.hero {
      max-width: 720px;
      margin: 4rem auto;
      padding: 0 2rem;
      text-align: center;
    }
    main.hero h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    main.hero p {
      font-size: 1.1rem;
      color: var(--muted);
    }
    .cta {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: var(--accent-fg);
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
    }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">aiwalk</div>
  </header>
  <main class="hero">
    <h1>aiwalk</h1>
    <p>Coming soon.</p>
    <a class="cta" href="#">Learn more</a>
  </main>
  <footer>&copy; 2026 aiwalk</footer>
</body>
</html>
